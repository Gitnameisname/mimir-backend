[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--tb=short",
    "--strict-markers",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-report=xml:coverage.xml",
    "--cov-report=html:htmlcov",
    # S3 Phase 0 / FG 0-3 (2026-04-23):
    # 단일 테스트 디렉터리 실행 시 임계값 미적용 (전체 스위트에서만 의미 있음).
    # 전체 게이트는 CI 에서 `python scripts/coverage_baseline.py --check` 로 강제.
    "--cov-fail-under=0",
    "-v",
]
markers = [
    "unit: 단위 테스트 (DB/외부 의존성 없음)",
    "integration: 통합 테스트 (실제 DB 필요)",
    "smoke: Fresh-boot 스모크 테스트 (실행 중인 앱 + 실제 DB 필요)",
    "e2e: 엔드-투-엔드 테스트",
    "slow: 느린 테스트 (부하 테스트 등)",
    "security: 보안 테스트 묶음",
    "owasp_general: OWASP Top 10 일반 보안 테스트",
    "owasp_llm: OWASP LLM Top 10 보안 테스트",
    "a01: OWASP A01 Broken Access Control 테스트",
    "a02: OWASP A02 Cryptographic Failures 테스트",
    "a03: OWASP A03 Injection 테스트",
    "a04: OWASP A04 Insecure Design 테스트",
    "a05: OWASP A05 Security Misconfiguration 테스트",
    "a06: OWASP A06 Vulnerable and Outdated Components 테스트",
    "a07: OWASP A07 Identification and Authentication Failures 테스트",
    "a08: OWASP A08 Software and Data Integrity Failures 테스트",
    "a09: OWASP A09 Security Logging and Monitoring Failures 테스트",
    "a10: OWASP A10 Server-Side Request Forgery 테스트",
    "llm01: OWASP LLM01 Prompt Injection 테스트",
    "llm02: OWASP LLM02 Insecure Output Handling 테스트",
    "llm03: OWASP LLM03 Training Data Poisoning 테스트",
    "llm04: OWASP LLM04 Model Denial of Service 테스트",
    "llm05: OWASP LLM05 Supply Chain 테스트",
    "llm06: OWASP LLM06 Sensitive Information Disclosure 테스트",
    "llm07: OWASP LLM07 Insecure Plugin Design 테스트",
    "llm08: OWASP LLM08 Excessive Agency 테스트",
    "llm09: OWASP LLM09 Overreliance 테스트",
    "llm10: OWASP LLM10 Model Theft 테스트",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/__pycache__/*",
    # 마이그레이션은 최초 1회만 실행되어 의미 있는 coverage 수집 불가
    "app/db/migrations/*",
    "app/db/migrations/versions/*",
    # 테스트 지원 픽스처 자체는 측정 대상 아님
    "*/conftest.py",
    # 일회성 시드/배치/수동 스크립트
    "app/*/init_data.py",
    "app/*/seed_*.py",
    "scripts/*",
]
branch = true
# pytest-xdist 도입 시점에 true 로 변경 — 현재는 순차 실행이므로 false 로 단순 유지.
parallel = false

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    # 방어적 로깅/디버깅 경로는 커버리지 대상 제외
    "except ImportError",
    "logger.debug",
    # 추상 메서드 스텁
    "@(abc\\.)?abstractmethod",
]
show_missing = true
# S3 P0 FG 0-3 (2026-04-23): 75% 전체 게이트. 상세 per-path 임계값(services/repositories 80%)은
# `backend/scripts/coverage_baseline.py --check` 로 CI 에서 별도 검증.
fail_under = 75
# 소수점 2자리 — 임계값 근접 판단용
precision = 2
skip_covered = false
sort = "-cover"

[tool.coverage.html]
directory = "htmlcov"
title = "Mimir Backend Coverage (S3 Phase 0 FG 0-3)"

[tool.coverage.xml]
output = "coverage.xml"

[tool.ruff]
line-length = 100
target-version = "py311"
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "S",   # bandit (security)
    "UP",  # pyupgrade
]
ignore = [
    "S101",  # assert 허용 (테스트용)
    "B008",  # FastAPI Depends() 패턴 허용
]

[tool.ruff.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106"]
