# ============================================================================
# Alembic 설정 (S2-5, 2026-04-20)
# ----------------------------------------------------------------------------
# 프로젝트가 SQLAlchemy ORM 을 쓰지 않고 psycopg2 + raw DDL 만 쓰기 때문에,
# Alembic 은 스키마 변경을 op.execute() 로 선언한다 (autogenerate 비활성).
#
# sqlalchemy.url 은 env.py 에서 app.config.settings.database_url 로 덮어쓰므로
# 여기 값은 플레이스홀더일 뿐이다.
# ============================================================================

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
timezone = UTC

# 파일명 규칙: YYYYMMDD_HHMM_<slug>.py  (시간순 정렬)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# sqlalchemy.url 은 env.py 에서 런타임 주입. 빈 값이면 안 되므로 placeholder 유지.
sqlalchemy.url = postgresql://override_in_env_py@localhost/mimir

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
